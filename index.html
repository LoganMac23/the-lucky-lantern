<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/cub3jmb.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Supermercado+One&display=swap" rel="stylesheet">

</head>

<body>

    <div class="content">
        <div class="background">
            <div class="container">

                <div class="logoContainer">
                    <div class="lanternContainer">
                        <img src="assets/logo_lantern.png">
                    </div>
                    
                    <div class="textContainer">
                        <h1>The Lucky Lantern</h1> 
                        <h2>Chinese-American Fusion</h2>
                    </div>
                    
                    <div class="lanternContainer">
                        <img src="assets/logo_lantern.png">
                    </div>
                </div>

                <div class="buttonContainer">
                    <div class="box">
                        Menu
                    </div>

                    <div class="box">
                        Reservations
                    </div>

                    <div class="box">
                        Online Order
                    </div>

                    <div class="box">
                        About
                    </div>

                </div>

            </div>
        </div>
    

        <div class="footer">

            <div class="fLeftBox">

                <div class="footerLogo">
                    <div class="lanternContainer">
                        <img src="assets/logo_lantern.png" class="foot">
                    </div>
                    
                    <div class="fTextContainer">
                        <h3>The Lucky Lantern</h3> 
                        <h4>Chinese-American Fusion</h4>
                    </div>
                    
                    <div class="lanternContainer">
                        <img src="assets/logo_lantern.png" class="foot">
                    </div>
                </div>
            
            </div>

            <div class="contact">
                    <h5>(801) 263-0938</br>715 E Green Valley Dr</br>Salt Lake City, Utah (UT). 84107</h5>
            </div>

            <div class="fMidBox">
                <div class="hoursHeader">
                    <h6>Hours:</h6>
                </div>

                <div class="hours">
                    <div class="days">
                        <h5>Sunday-Thursday Friday-Saturday</h5>
                    </div>
                    <div class="times">
                        <h5>11:00 AM - 9:00 PM 11:00 AM - 10:00 PM</h5>
                    </div>
                </div>
            </div>


        </div>

    </div>




</body>


</html>
